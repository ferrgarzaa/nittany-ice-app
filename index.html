<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Wildhorn Trail Running Association — community trail races, training programs, and youth running across the wild ridgelines." />
  <meta name="theme-color" content="#4A3A5C" />
  <title>Wildhorn Trail Running Association</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wtra-cream: #F5EFE0;
      --wtra-beige: #E8DDC8;
      --wtra-sand: #D4C5A9;
      --wtra-purple: #5C4A6E;
      --wtra-purple-deep: #4A3A5C;
      --wtra-purple-soft: #9A86AE;
      --wtra-green: #6B7A4C;
      --wtra-green-deep: #4A5938;
      --wtra-green-soft: #8B9A6C;
      --wtra-brown: #6B4423;
      --wtra-brown-light: #8B6F47;
      --wtra-earth: #3D2E1F;
      --wtra-bark: #2A2520;
      --wtra-night: #1A1612;
      --wtra-bg: var(--wtra-cream);
      --wtra-surface: #FFFFFF;
      --wtra-surface-alt: var(--wtra-beige);
      --wtra-text: var(--wtra-bark);
      --wtra-text-muted: #5C5249;
      --wtra-border: rgba(74, 58, 92, 0.18);
      --wtra-accent: var(--wtra-purple-deep);
      --wtra-accent-2: var(--wtra-green-deep);
      --wtra-shadow: 0 8px 26px rgba(74, 58, 92, 0.12);
      --wtra-radius: 14px;
      --wtra-font-sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      --wtra-font-display: "Fraunces", Georgia, serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --wtra-bg: var(--wtra-night);
        --wtra-surface: #2A2520;
        --wtra-surface-alt: #221E19;
        --wtra-text: var(--wtra-cream);
        --wtra-text-muted: #B8AC97;
        --wtra-border: rgba(154, 134, 174, 0.22);
        --wtra-accent: var(--wtra-purple-soft);
        --wtra-accent-2: var(--wtra-green-soft);
        --wtra-shadow: 0 8px 26px rgba(0, 0, 0, 0.45);
      }
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--wtra-bg);
      color: var(--wtra-text);
      font-family: var(--wtra-font-sans);
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }
    nittany-ice-app {
      display: block;
    }
  </style>
</head>
<body>
  <nittany-ice-app></nittany-ice-app>
  <script type="module">
    import "./nittany-ice-app.js";
  </script>
</body>
</html>
